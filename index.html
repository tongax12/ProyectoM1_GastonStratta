<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header>
        <h1>Generador de Paleta de colores aleatorios</h1>
    </header>

    <main>
        <section class="controls">
            <h2>Toca el botón Generar Paleta y ve jugando con los colores!</h2>
            <p>Seleccione una cantidad y un formato para empezar tu experiencia.</p>
        </section>
        <select> 
            <option id="seleccione un número">Seleccione un número</option>
            <option id="6">6</option>
            <option id="8">8</option>
            <option id="9">9</option>
        </select>
        <select>
            <option id="seleccione un formato">Seleccione un formato</option>
            <option id="HSL">HSL</option>
            <option id="HEX">HEX</option>
        </select>
        <button id="generaPaleta">Generar paleta</button>
        <section id="paletaColores">   
            <!-- ACA VAN LOS COLORES -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ColorFly Studios. Todos los derechos reservados.</p>
    </footer>

    <script src="./js/script.js"></script>
</body>
</html>
